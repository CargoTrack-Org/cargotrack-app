# CargoTrack — Development Compose Override
#
# Adds a local PostgreSQL container for development and testing.
# Use this when you do NOT have an external database available.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# This file OVERRIDES the base docker-compose.yml:
#   - Adds the `postgres` service
#   - Wires backend to use the local postgres container
#   - Adds postgres healthcheck dependency to backend

services:
  postgres:
    image: postgres:15-alpine
    container_name: cargotrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-cargotrack}
      POSTGRES_USER: ${DATABASE_USER:-cargotrack}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-cargotrack123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-cargotrack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    environment:
      DATABASE_HOST: postgres
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
