name: Promote — Production Deployment

# ─── Trigger ──────────────────────────────────────────────────────────────────
# MANUAL ONLY. Never triggered automatically.
# Run after validating the target SHA in cargotrack-dev.
#
# How to use:
#   GitHub Actions → "Promote — Production Deployment" → Run workflow
#   image_sha: the full Git SHA that is already running in dev
#
# Gate: this workflow uses GitHub environment "prod".
#   Configure required reviewers at:
#   Settings → Environments → prod → Required reviewers
#   The job will pause for approval before touching cargotrack-helm.
on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Git SHA to promote to production (must already be validated in dev)'
        required: true
        default: ''

# ─── Concurrency ──────────────────────────────────────────────────────────────
# Same group as deploy.yml. Only one workflow may write to cargotrack-helm at a
# time — dev auto-deploys and prod promotions are fully serialised.
concurrency:
  group: helm-push
  cancel-in-progress: false

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  id-token: write   # OIDC → AWS
  contents: read

env:
  AWS_REGION: us-east-1
  HELM_REPO: CargoTrack-Org/cargotrack-helm

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Write the promoted SHA into values-prod.yaml for all four charts.
  # ArgoCD detects the change and syncs cargotrack-prod automatically.
  # ════════════════════════════════════════════════════════════════════════════
  update-helm-tags:
    name: Update Helm Image Tags (prod)
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR registry URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Checkout cargotrack-helm repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_REPO_TOKEN }}
          path: cargotrack-helm

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in values-prod.yaml
        run: |
          SHA="${{ github.event.inputs.image_sha }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"

          for CHART in frontend core-service document-service ai-service; do
            VALUES="cargotrack-helm/${CHART}/values-prod.yaml"
            yq -i ".image.registry = \"${REGISTRY}\"" "${VALUES}"
            yq -i ".image.tag = \"${SHA}\""           "${VALUES}"
            echo "  ✅ ${CHART}/values-prod.yaml → SHA=${SHA:0:8}"
          done
          echo "✅ All 4 chart prod values updated"

      - name: Commit and push to cargotrack-helm
        run: |
          SHA="${{ github.event.inputs.image_sha }}"
          cd cargotrack-helm
          git config user.name "GitHub Actions — CargoTrack Promote"
          git config user.email "actions@cargotrack.io"
          git add .
          git diff --staged --quiet || \
            git commit -m "promote(prod): images tagged ${SHA::8} [skip ci]"
          git pull --rebase origin main
          git push
          echo "✅ Helm values updated — ArgoCD will sync cargotrack-prod within 3 minutes"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Verify prod pods are healthy after ArgoCD reconciles
  # ════════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Tests (prod)
    runs-on: ubuntu-latest
    needs: [update-helm-tags]
    environment: prod

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for ArgoCD to sync (2-minute grace period)
        run: |
          echo "Waiting 120 seconds for ArgoCD to detect new image tag and reconcile pods..."
          sleep 120
          echo "Grace period complete — proceeding to health checks"

      - name: Discover prod ALB endpoint from AWS
        id: alb
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'cargotrack')].LoadBalancerArn" \
            --output text 2>/dev/null | head -1 || echo "")

          if [ -n "${ALB_ARN}" ] && [ "${ALB_ARN}" != "None" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --load-balancer-arns "${ALB_ARN}" \
              --query "LoadBalancers[0].DNSName" \
              --output text 2>/dev/null || echo "")
            echo "alb_dns=${ALB_DNS}" >> $GITHUB_OUTPUT
            echo "✅ Found prod ALB: ${ALB_DNS}"
          else
            echo "alb_dns=" >> $GITHUB_OUTPUT
            echo "⚠️  No cargotrack ALB found — skipping endpoint health checks"
          fi

      - name: Run health endpoint smoke tests
        run: |
          ALB="${{ steps.alb.outputs.alb_dns }}"

          if [ -z "${ALB}" ]; then
            echo "⚠️  No ALB endpoint available — skipping HTTP health checks"
            echo "✅ Smoke test skipped (ALB not yet provisioned)"
            exit 0
          fi

          echo "Testing prod endpoints on ALB: http://${ALB}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 \
            "http://${ALB}/api/health" || echo "000")
          echo "  /api/health → HTTP ${HTTP_CODE}"

          FRONTEND_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://${ALB}/" || echo "000")
          echo "  /          → HTTP ${FRONTEND_CODE}"

          NGINX_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://${ALB}/health" || echo "000")
          echo "  /health    → HTTP ${NGINX_CODE}"

          if [ "${HTTP_CODE}" = "200" ]; then
            echo "✅ Prod core service is healthy"
          else
            echo "⚠️  Prod core service returned HTTP ${HTTP_CODE} — may still be warming up"
          fi

          if [ "${FRONTEND_CODE}" = "200" ]; then
            echo "✅ Prod frontend is healthy"
          else
            echo "⚠️  Prod frontend returned HTTP ${FRONTEND_CODE}"
          fi

          echo "✅ Prod smoke tests complete — SHA ${{ github.event.inputs.image_sha }}"

      - name: Notify on success
        if: success()
        run: echo "🚀 Production deployment successful — SHA ${{ github.event.inputs.image_sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Production deployment FAILED — check ArgoCD cargotrack-prod and pod logs"
