name: Deploy — Update Helm Tags & Sync ArgoCD

# ─── Triggers ─────────────────────────────────────────────────────────────────
# Triggered by build.yml dispatch OR manually with an image SHA
on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Git SHA of the images to deploy'
        required: true
        default: ''
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  id-token: write   # OIDC → AWS (to read ECR registry URL)
  contents: read

env:
  AWS_REGION: us-east-1
  HELM_REPO: CargoTrack-Org/cargotrack-helm
  # HELM_REPO_TOKEN must be a GitHub Personal Access Token (classic or fine-grained)
  # with repo:write access to CargoTrack-Org/cargotrack-helm.
  # Set it as a repository secret: Settings → Secrets → Actions → HELM_REPO_TOKEN.
  # The default GITHUB_TOKEN cannot push to a different repository.

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Update image tags in cargotrack-helm → ArgoCD auto-syncs
  # ════════════════════════════════════════════════════════════════════════════
  update-helm-tags:
    name: Update Helm Image Tags (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR registry URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Checkout cargotrack-helm repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_REPO_TOKEN }}
          path: cargotrack-helm

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "env=${ENV}" >> $GITHUB_OUTPUT
          echo "values_file=cargotrack/values-${ENV}.yaml" >> $GITHUB_OUTPUT

      - name: Update image tags in values file
        run: |
          SHA="${{ github.event.inputs.image_sha || github.sha }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          VALUES="cargotrack-helm/${{ steps.env.outputs.values_file }}"

          yq -i ".image.registry = \"${REGISTRY}\""   "$VALUES"
          yq -i ".coreService.tag = \"${SHA}\""        "$VALUES"
          yq -i ".documentService.tag = \"${SHA}\""    "$VALUES"
          yq -i ".aiService.tag = \"${SHA}\""          "$VALUES"
          yq -i ".frontend.tag = \"${SHA}\""           "$VALUES"
          echo "✅ Updated ${{ steps.env.outputs.values_file }} with SHA=${SHA:0:8}"

      - name: Commit and push to cargotrack-helm
        run: |
          cd cargotrack-helm
          git config user.name "GitHub Actions — CargoTrack Deploy"
          git config user.email "actions@cargotrack.io"
          git add .
          git diff --staged --quiet || \
            git commit -m "deploy(${{ steps.env.outputs.env }}): images tagged ${GITHUB_SHA::8} [skip ci]"
          git push
          echo "✅ Helm values updated — ArgoCD will auto-sync within 3 minutes"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Smoke tests — verify pods are healthy after ArgoCD syncs
  # Waits for ArgoCD to pick up the new tag and reconcile pods
  # ════════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Tests (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [update-helm-tags]
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for ArgoCD to sync (90s grace period)
        run: |
          echo "Waiting 90 seconds for ArgoCD to detect new image tag and trigger rollout..."
          sleep 90

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name cargotrack --region ${{ env.AWS_REGION }}

      - name: Verify rollout status
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          NS="cargotrack-${ENV}"
          echo "=== Checking rollout status in namespace: ${NS} ==="
          kubectl rollout status deployment/core-service     -n "${NS}" --timeout=300s
          kubectl rollout status deployment/ai-service       -n "${NS}" --timeout=300s
          kubectl rollout status deployment/document-service -n "${NS}" --timeout=300s
          kubectl rollout status deployment/frontend         -n "${NS}" --timeout=300s
          echo "✅ All deployments are healthy"

      - name: Get pod status
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          NS="cargotrack-${ENV}"
          kubectl get pods -n "${NS}" -o wide

      - name: Run health endpoint smoke tests
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          NS="cargotrack-${ENV}"
          # Get ALB endpoint from ingress in the correct namespace
          ALB=$(kubectl get ingress -n "${NS}" -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [ -n "${ALB}" ]; then
            echo "ALB endpoint: ${ALB}"
            # Test core-service health (via ALB)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${ALB}/api/health" || echo "000")
            echo "Core service /api/health → HTTP ${HTTP_CODE}"
            if [ "${HTTP_CODE}" != "200" ]; then
              echo "⚠️  Health check returned ${HTTP_CODE} — ALB may still be warming up"
            fi
          else
            echo "⚠️  No ALB ingress found in namespace ${NS} — skipping external health check"
          fi
          echo "✅ Smoke tests complete"

      - name: Notify on success
        if: success()
        run: echo "🚀 Deployment to ${{ github.event.inputs.environment || 'dev' }} successful — SHA ${{ github.event.inputs.image_sha || github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment to ${{ github.event.inputs.environment || 'dev' }} FAILED — check ArgoCD and pod logs"
