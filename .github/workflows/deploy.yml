name: Deploy — Update Helm Tags & Sync ArgoCD

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Git SHA of the images to deploy'
        required: true
        default: ''
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]
      services:
        description: 'JSON array of services to update, e.g. ["ai-service","frontend"]. Leave blank to update all.'
        required: false
        default: '["core-service","ai-service","document-service","frontend"]'

permissions:
  id-token: write
  contents: read

concurrency:
  group: helm-push
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  HELM_REPO: CargoTrack-Org/cargotrack-helm

jobs:
  update-helm-tags:
    name: Update Helm Image Tags (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR registry URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Resolve helm branch
        id: helm-branch
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "branch=develop" >> $GITHUB_OUTPUT
          fi

      - name: Checkout cargotrack-helm repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_REPO_TOKEN }}
          ref: ${{ steps.helm-branch.outputs.branch }}
          path: cargotrack-helm

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "env=${ENV}" >> $GITHUB_OUTPUT

      - name: Update image tags in per-service values files
        env:
          SERVICES: ${{ github.event.inputs.services || '["core-service","ai-service","document-service","frontend"]' }}
        run: |
          SHA="${{ github.event.inputs.image_sha || github.sha }}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          ENV="${{ steps.env.outputs.env }}"
          BASE="cargotrack-helm"

          echo "Updating services: $SERVICES"

          echo "$SERVICES" | jq -r '.[]' | while read CHART; do
            VALUES="${BASE}/${CHART}/values-${ENV}.yaml"
            yq -i ".image.registry = \"${REGISTRY}\"" "${VALUES}"
            yq -i ".image.tag = \"${SHA}\""           "${VALUES}"
            echo "  ✅ ${CHART}/values-${ENV}.yaml → SHA=${SHA:0:8}"
          done
          echo "✅ $(echo "$SERVICES" | jq 'length') service(s) updated for environment: ${ENV}"

      - name: Commit and push to cargotrack-helm
        run: |
          HELM_BRANCH="${{ steps.helm-branch.outputs.branch }}"
          cd cargotrack-helm
          git config user.name "GitHub Actions — CargoTrack Deploy"
          git config user.email "actions@cargotrack.io"
          git add .
          git diff --staged --quiet || \
            git commit -m "deploy(${{ steps.env.outputs.env }}): images tagged ${GITHUB_SHA::8} [skip ci]"
          git pull --rebase origin "${HELM_BRANCH}"
          git push origin "${HELM_BRANCH}"
          echo "✅ Helm values updated on ${HELM_BRANCH} — ArgoCD will auto-sync within 3 minutes"

  smoke-test:
    name: Smoke Tests (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [update-helm-tags]
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name cargotrack

      - name: Wait for ArgoCD to sync
        run: |
          echo "Waiting 90 seconds for ArgoCD to detect new image tag..."
          sleep 90

      - name: Verify rollout status
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          NS="cargotrack-${ENV}"
          echo "Checking rollout status in namespace: ${NS}"

          for SVC in frontend core-service document-service ai-service; do
            echo "→ kubectl rollout status deployment/${SVC} -n ${NS}"
            kubectl rollout status deployment/${SVC} -n ${NS} --timeout=5m \
              && echo "  ✅ ${SVC} rollout complete" \
              || echo "  ⚠️  ${SVC} rollout timed out — pods may still be starting"
          done

      - name: Discover ALB endpoint from AWS
        id: alb
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          NS="cargotrack-${ENV}"

          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'cargotrack')].LoadBalancerArn" \
            --output text 2>/dev/null | head -1 || echo "")

          if [ -n "${ALB_ARN}" ] && [ "${ALB_ARN}" != "None" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --load-balancer-arns "${ALB_ARN}" \
              --query "LoadBalancers[0].DNSName" \
              --output text 2>/dev/null || echo "")
            echo "alb_dns=${ALB_DNS}" >> $GITHUB_OUTPUT
            echo "✅ Found ALB: ${ALB_DNS}"
          else
            echo "alb_dns=" >> $GITHUB_OUTPUT
            echo "⚠️  No cargotrack ALB found — skipping endpoint health checks"
          fi

      - name: Run health endpoint smoke tests
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          ALB="${{ steps.alb.outputs.alb_dns }}"

          if [ -z "${ALB}" ]; then
            echo "⚠️  No ALB endpoint available — skipping HTTP health checks"
            echo "✅ Smoke test skipped (ALB not yet provisioned)"
            exit 0
          fi

          echo "Testing endpoints on ALB: http://${ALB}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 5 \
            "http://${ALB}/api/health" || echo "000")
          echo "  /api/health        → HTTP ${HTTP_CODE}"

          FRONTEND_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://${ALB}/" || echo "000")
          echo "  /                  → HTTP ${FRONTEND_CODE}"

          NGINX_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://${ALB}/health" || echo "000")
          echo "  /health (nginx)    → HTTP ${NGINX_CODE}"

          if [ "${HTTP_CODE}" = "200" ]; then
            echo "✅ Core service is healthy"
          else
            echo "⚠️  Core service returned HTTP ${HTTP_CODE} — may still be warming up (ALB target health check takes 30-60s after pod start)"
          fi

          if [ "${FRONTEND_CODE}" = "200" ]; then
            echo "✅ Frontend is healthy"
          else
            echo "⚠️  Frontend returned HTTP ${FRONTEND_CODE}"
          fi

          echo "✅ Smoke tests complete for environment: ${ENV}"

      - name: Notify on success
        if: success()
        run: echo "🚀 Deployment to ${{ github.event.inputs.environment || 'dev' }} successful — SHA ${{ github.event.inputs.image_sha || github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment to ${{ github.event.inputs.environment || 'dev' }} FAILED — check ArgoCD and pod logs"
