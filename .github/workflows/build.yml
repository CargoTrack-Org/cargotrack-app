name: Build — Lint, SAST, Scan & Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write
  actions: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      services_json: ${{ steps.set-matrix.outputs.services_json }}
      deploy_env: ${{ steps.set-matrix.outputs.deploy_env }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect service path changes (develop only)
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core-service:
              - 'services/core-service/**'
            ai-service:
              - 'services/ai-service/**'
            document-service:
              - 'services/document-service/**'
            frontend:
              - 'frontend/**'

      - name: Build service matrix
        id: set-matrix
        run: |
          INCLUDE=()
          SERVICES=()

          add() {
            INCLUDE+=("{\"service\":\"$1\",\"context\":\"$2\",\"ecr_repo\":\"$3\"}")
            SERVICES+=("\"$1\"")
          }

          all_services() {
            add core-service     ./services/core-service     cargotrack-core
            add ai-service       ./services/ai-service       cargotrack-ai
            add document-service ./services/document-service cargotrack-docs
            add frontend         ./frontend                  cargotrack-frontend
          }

          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "pull_request" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Building ALL services (main / PR / manual trigger)"
            all_services
          else
            echo "develop push — selective rebuild"
            [ "${{ steps.filter.outputs.core-service }}" = "true" ]     && add core-service     ./services/core-service     cargotrack-core
            [ "${{ steps.filter.outputs.ai-service }}" = "true" ]       && add ai-service       ./services/ai-service       cargotrack-ai
            [ "${{ steps.filter.outputs.document-service }}" = "true" ] && add document-service ./services/document-service cargotrack-docs
            [ "${{ steps.filter.outputs.frontend }}" = "true" ]         && add frontend         ./frontend                  cargotrack-frontend

            if [ ${#INCLUDE[@]} -eq 0 ]; then
              echo "No service code changed — building all to validate CI config"
              all_services
            fi
          fi

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            DEPLOY_ENV="prod"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            DEPLOY_ENV="dev"
          else
            DEPLOY_ENV="none"
          fi

          MATRIX_JSON=$(printf '%s,' "${INCLUDE[@]}" | sed 's/,$//')
          SERVICES_JSON=$(printf '%s,' "${SERVICES[@]}" | sed 's/,$//')

          echo "matrix={\"include\":[${MATRIX_JSON}]}"   >> $GITHUB_OUTPUT
          echo "services_json=[${SERVICES_JSON}]"        >> $GITHUB_OUTPUT
          echo "deploy_env=${DEPLOY_ENV}"                >> $GITHUB_OUTPUT

          echo "Services to build: [${SERVICES_JSON}]"
          echo "Deploy target: ${DEPLOY_ENV}"

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint — core-service
        run: |
          npm install --prefix services/core-service
          cd services/core-service && npx tsc --noEmit

      - name: Lint — ai-service
        run: |
          npm install --prefix services/ai-service
          cd services/ai-service && npx tsc --noEmit

      - name: Lint — document-service
        run: |
          npm install --prefix services/document-service
          cd services/document-service && npx tsc --noEmit

  sonarqube:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  snyk-sca:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies for all services
        run: |
          npm install --prefix services/core-service
          npm install --prefix services/ai-service
          npm install --prefix services/document-service

      - name: Snyk scan — core-service
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=services/core-service/package.json --severity-threshold=high

      - name: Snyk scan — ai-service
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=services/ai-service/package.json --severity-threshold=high

      - name: Snyk scan — document-service
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=services/document-service/package.json --severity-threshold=high

  build-scan-push:
    name: Build, Scan & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub (avoids rate limits on moby/buildkit pull)
        if: env.DOCKERHUB_USERNAME != ''
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Resolve image references
        id: img
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            SHA="${{ github.sha }}"
            echo "full_image=${REGISTRY}/${{ matrix.ecr_repo }}:${SHA}" >> $GITHUB_OUTPUT
            echo "latest_image=${REGISTRY}/${{ matrix.ecr_repo }}:latest"   >> $GITHUB_OUTPUT
            echo "should_push=true"  >> $GITHUB_OUTPUT
          else
            echo "full_image=${{ matrix.ecr_repo }}:pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
            echo "latest_image=${{ matrix.ecr_repo }}:latest-pr"                   >> $GITHUB_OUTPUT
            echo "should_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Set SHA output
        id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image (multistage)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.img.outputs.full_image }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.full_image }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Trivy hard gate — fail on CRITICAL vulnerabilities
        if: steps.img.outputs.should_push == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.full_image }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push image to ECR
        if: steps.img.outputs.should_push == 'true'
        run: |
          docker push "${{ steps.img.outputs.full_image }}"
          docker tag  "${{ steps.img.outputs.full_image }}" "${{ steps.img.outputs.latest_image }}"
          docker push "${{ steps.img.outputs.latest_image }}"
          echo "✅ Pushed ${{ matrix.service }} → ${{ steps.img.outputs.full_image }}"

  trigger-deploy:
    name: Trigger Deploy (${{ needs.detect-changes.outputs.deploy_env }})
    runs-on: ubuntu-latest
    needs: [detect-changes, build-scan-push]
    if: |
      github.event_name != 'pull_request' &&
      success() &&
      needs.detect-changes.outputs.deploy_env != 'none'

    steps:
      - name: Dispatch deploy workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const env     = '${{ needs.detect-changes.outputs.deploy_env }}';
            const services = '${{ needs.detect-changes.outputs.services_json }}';

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref,
              inputs: {
                image_sha:   '${{ github.sha }}',
                environment: env,
                services:    services
              }
            });

            console.log(`✅ Deploy triggered for ${env} — SHA: ${{ github.sha }}`);
            console.log(`ℹ️  Services: ${services}`);
            if (env === 'prod') {
              console.log('ℹ️  Prod: all 4 services rebuilt from this SHA — prod is fully consistent.');
            } else {
              console.log('ℹ️  Dev: only changed services redeployed — unchanged services keep existing tags.');
            }
