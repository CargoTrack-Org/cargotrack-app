name: Build — Lint, SAST, Scan & Push

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'frontend/**'
  workflow_dispatch:

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  id-token: write        # OIDC → AWS (ECR push role assumption)
  contents: read
  security-events: write # Upload SARIF to GitHub Security tab
  actions: write         # Trigger deploy.yml via workflow_dispatch (trigger-deploy job)

# Cancel in-progress builds on the same branch when a new push arrives.
# Prevents a stale build from queuing a deploy after a newer build already has.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: SonarQube SAST
  # ════════════════════════════════════════════════════════════════════════════
  sonarqube:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Snyk SCA — dependency vulnerability scan
  # ════════════════════════════════════════════════════════════════════════════
  snyk-sca:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies for all services
        run: |
          npm install --prefix services/core-service
          npm install --prefix services/ai-service
          npm install --prefix services/document-service

      - name: Snyk scan — core-service
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=services/core-service/package.json --severity-threshold=high

      - name: Snyk scan — ai-service
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=services/ai-service/package.json --severity-threshold=high

      - name: Snyk scan — document-service
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=services/document-service/package.json --severity-threshold=high

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: Build, Trivy scan, push to ECR
  # Uses OIDC — no long-lived AWS credentials stored in GitHub.
  # ════════════════════════════════════════════════════════════════════════════
  build-scan-push:
    name: Build, Scan & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    # Expose Docker Hub username as a job-level env so we can reference it
    # in a step-level `if:` condition. The `secrets` context is NOT available
    # in `if:` expressions — only `env`, `github`, `needs`, etc. are valid there.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: core-service
            context: ./services/core-service
            ecr_repo: cargotrack-core

          - service: ai-service
            context: ./services/ai-service
            ecr_repo: cargotrack-ai

          - service: document-service
            context: ./services/document-service
            ecr_repo: cargotrack-docs

          - service: frontend
            context: ./frontend
            ecr_repo: cargotrack-frontend

    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub (avoids rate limits on moby/buildkit pull)
        # docker/setup-buildx-action pulls moby/buildkit from Docker Hub to boot
        # the builder. Anonymous pulls share a rate limit (100/6h per runner IP)
        # causing intermittent failures. Authenticated pulls have a much higher
        # quota, effectively eliminating the issue.
        # Requires secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
        # (hub.docker.com → Account Settings → Personal access tokens)
        # NOTE: uses env.DOCKERHUB_USERNAME (job-level env) NOT secrets.* in if:
        #       because GitHub Actions does not allow secrets context in if expressions.
        if: env.DOCKERHUB_USERNAME != ''
        continue-on-error: true   # Docker Hub auth may timeout under concurrent load; don't fail the build
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the built-in Docker daemon driver (no Docker Hub pull needed).
          # The default 'docker-container' driver pulls moby/buildkit from Docker Hub
          # during setup, which times out when 4 parallel jobs hit Docker Hub simultaneously.
          # The 'docker' driver uses the runner's pre-installed dockerd — no network call.
          driver: docker

      - name: Resolve image references
        id: img
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            REGISTRY="${{ steps.ecr-login.outputs.registry }}"
            SHA="${{ github.sha }}"
            echo "full_image=${REGISTRY}/${{ matrix.ecr_repo }}:${SHA}" >> $GITHUB_OUTPUT
            echo "latest_image=${REGISTRY}/${{ matrix.ecr_repo }}:latest"   >> $GITHUB_OUTPUT
            echo "should_push=true"  >> $GITHUB_OUTPUT
          else
            echo "full_image=${{ matrix.ecr_repo }}:pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
            echo "latest_image=${{ matrix.ecr_repo }}:latest-pr"                   >> $GITHUB_OUTPUT
            echo "should_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Set SHA output
        id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image (multistage)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.img.outputs.full_image }}
          # NOTE: cache-from/cache-to type=gha requires BuildKit docker-container driver.
          # We use driver:docker (no Docker Hub dependency) so GHA cache is not available.
          # Builds are slightly slower but reliably independent of Docker Hub connectivity.

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.full_image }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      # Hard gate: fail the build if CRITICAL vulns exist in pushed images
      - name: Trivy hard gate — fail on CRITICAL vulnerabilities
        if: steps.img.outputs.should_push == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.full_image }}
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push image to ECR
        if: steps.img.outputs.should_push == 'true'
        run: |
          docker push "${{ steps.img.outputs.full_image }}"
          docker tag  "${{ steps.img.outputs.full_image }}" "${{ steps.img.outputs.latest_image }}"
          docker push "${{ steps.img.outputs.latest_image }}"
          echo "✅ Pushed ${{ matrix.service }} → ${{ steps.img.outputs.full_image }}"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4: Trigger deploy pipeline after successful build
  # ════════════════════════════════════════════════════════════════════════════
  # FIX: Previously this job dispatched deploy.yml for BOTH dev AND prod
  # simultaneously. Both runs would checkout cargotrack-helm at the same Git
  # revision, make changes, commit, and push — causing a race condition:
  #
  #   dev  → commits B on top of A → pushes B ✅
  #   prod → commits C on top of A → pushes C ❌ (remote is now at B)
  #
  # Error: "Updates were rejected because the remote contains work you do not
  # have locally."
  #
  # FIX: Only auto-deploy to dev. Prod is promoted MANUALLY via:
  #   GitHub Actions → deploy.yml → Run workflow → environment: prod
  # This is proper GitOps: auto to dev, manual promotion to prod.
  trigger-deploy:
    name: Trigger Deploy (dev)
    runs-on: ubuntu-latest
    needs: [build-scan-push]
    if: github.event_name != 'pull_request' && success()

    steps:
      - name: Dispatch deploy workflow — dev only
        # IMPORTANT: Only dev is auto-deployed on build.
        # To promote to prod: GitHub Actions → deploy.yml → Run workflow → environment: prod
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref,
              inputs: {
                image_sha: '${{ github.sha }}',
                environment: 'dev'
              }
            });
            console.log('✅ Deploy workflow triggered for dev — SHA: ${{ github.sha }}');
            console.log('ℹ️  Prod deploy is MANUAL: Actions → deploy.yml → Run workflow → environment: prod');
