# nginx.conf — CargoTrack v3 Frontend
#
# Multi-upstream routing for the 3-service architecture:
#   /api/documents/*  → document-service (DOCUMENT_SERVICE_URL)
#   /api/*            → core-service     (CORE_SERVICE_URL)
#
# Environment variables substituted at startup by envsubst (Dockerfile CMD):
#   CORE_SERVICE_URL     — e.g. http://core-service:4000
#   DOCUMENT_SERVICE_URL — e.g. http://document-service:4001
#
# HOW PROXYING WORKS:
# $CORE_SERVICE_URL and $DOCUMENT_SERVICE_URL are SHELL variables, not nginx
# variables. envsubst replaces them before nginx starts, so proxy_pass receives
# a literal URL (e.g. proxy_pass http://core-service:4000;).
#
# A literal proxy_pass is resolved by nginx at config-load time using the pod's
# /etc/resolv.conf → CoreDNS. NO resolver directive is needed.
#
# This avoids the previous `resolver kube-dns.kube-system.svc.cluster.local`
# bug where a hostname (not an IP) was passed to the resolver directive, causing
# nginx to silently ignore it and return 502 for all proxied API calls.
#
# nginx's own variables ($host, $http_upgrade, etc.) are preserved because
# envsubst only substitutes the two listed variables, not all $vars.

server {
    listen 8080;   # Non-root: nginx runs as UID 101. Ports <1024 require root; 8080 does not.
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward real client IP from ALB / CloudFront
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # ── Document Service Routes ─────────────────────────────────────────────
    # MUST be defined before the generic /api/ block (longest-prefix match).
    # $DOCUMENT_SERVICE_URL is a shell variable → envsubst substitutes it to
    # a literal URL at startup → nginx resolves via CoreDNS at config-load time.
    location /api/documents/ {
        proxy_pass $DOCUMENT_SERVICE_URL;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Higher timeout for file uploads
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # Allow uploads up to 10MB (matches multer limit in document-service)
        client_max_body_size 10M;
    }

    # ── Core Service Routes ─────────────────────────────────────────────────
    # Handles: /api/auth/*, /api/shipments/*, /api/admin/*, /api/tracking/*,
    #          /api/notifications/*, /api/reports/*, /api/health, /api/docs
    # $CORE_SERVICE_URL → envsubst → literal proxy_pass (no resolver needed).
    location /api/ {
        proxy_pass $CORE_SERVICE_URL;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }

    # ── File Uploads (legacy local storage) ────────────────────────────────
    location /uploads/ {
        proxy_pass $CORE_SERVICE_URL;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SPA catch-all (React Router) ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── nginx health check (load balancer target) ────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
