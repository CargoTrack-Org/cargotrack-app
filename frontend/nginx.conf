# nginx.conf — CargoTrack v3 Frontend
#
# Multi-upstream routing for the 3-service architecture:
#   /api/documents/*  → document-service (DOCUMENT_SERVICE_URL)
#   /api/*            → core-service     (CORE_SERVICE_URL)
#
# Environment variables substituted at startup by envsubst:
#   CORE_SERVICE_URL     — e.g. http://core-service:4000
#   DOCUMENT_SERVICE_URL — e.g. http://document-service:4001
#
# FIX: nginx does not allow `proxy_pass $VAR/path/` (variable URL + URI suffix)
# without a resolver directive. This causes: "invalid URL prefix" at startup.
#
# Solution: use separate `set $upstream` variables so proxy_pass receives
# a clean variable reference, and append the URI manually with $request_uri.
# The kube-dns resolver (169.254.20.10 or coredns ClusterIP) resolves
# Kubernetes service hostnames at runtime, enabling the variable proxy_pass.
#
# nginx's own variables ($host, $http_upgrade, etc.) are preserved because
# we only pass CORE_SERVICE_URL and DOCUMENT_SERVICE_URL to envsubst.

server {
    listen 8080;   # Non-root: nginx runs as UID 101. Ports <1024 require root; 8080 does not.
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Kubernetes CoreDNS resolver — required for variable proxy_pass
    # This allows nginx to resolve service hostnames at runtime instead of
    # at config-load time (which would fail if the service doesn't exist yet).
    resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

    # Forward real client IP from ALB / CloudFront
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # ── Document Service Routes ─────────────────────────────────────────────
    # MUST be defined before the generic /api/ block (longest-prefix match).
    # FIX: Use set $upstream to avoid "invalid URL prefix" when combining
    #      a variable with a URI path in proxy_pass.
    location /api/documents/ {
        set $upstream_docs $DOCUMENT_SERVICE_URL;
        proxy_pass $upstream_docs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Higher timeout for file uploads
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # Allow uploads up to 10MB (matches multer limit in document-service)
        client_max_body_size 10M;
    }

    # ── Core Service Routes ─────────────────────────────────────────────────
    # Handles: /api/auth/*, /api/shipments/*, /api/admin/*, /api/tracking/*,
    #          /api/notifications/*, /api/reports/*, /api/health, /api/docs
    # FIX: Same variable proxy_pass pattern.
    location /api/ {
        set $upstream_core $CORE_SERVICE_URL;
        proxy_pass $upstream_core;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }

    # ── File Uploads (legacy local storage) ────────────────────────────────
    location /uploads/ {
        set $upstream_uploads $CORE_SERVICE_URL;
        proxy_pass $upstream_uploads;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SPA catch-all (React Router) ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── nginx health check (load balancer target) ────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
