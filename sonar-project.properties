# SonarQube/SonarCloud project configuration for CargoTrack
# NOTE: sonar.organization is NOT set here — it is passed dynamically by the
# CI workflow using github.repository_owner (lowercased) so no hardcoded org
# key is needed and this file works for any GitHub account.

sonar.projectKey=cargotrack
sonar.projectName=CargoTrack Logistics Platform
sonar.projectVersion=1.0

# Source roots
sonar.sources=services,frontend/src

# Exclusions — skip build artifacts, node_modules, migrations, generated files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/prisma/migrations/**,\
  **/.next/**,\
  **/coverage/**,\
  **/generated/**

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx

# TypeScript/JavaScript coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
